services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq

    ports:
      - "5672:5672"
      - "15672:15672"

  plataforma-educativa:

    image: fimova/plataforma-edu-productor:latest

    container_name: plataforma-educativa

    depends_on:
      - rabbitmq

    ports:
      - "8080:8080"

    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest

    volumes:
      - "/home/ubuntu/wallet:/wallet"

  consumidor:

    image: fimova/plataforma-edu-consumidor:latest

    container_name: consumidor

    depends_on:
      - rabbitmq

    ports:
      - "8081:8081"

    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest

    volumes:
      - "/home/ubuntu/wallet:/wallet"